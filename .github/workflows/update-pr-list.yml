name: Update merged PR list

on:
  schedule:
    - cron: '17 13 * * *'  # ~06:17 Pacific, daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Regenerate PR-list block in README.md
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/update_readme.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: auto-update merged PR list"
          git push
